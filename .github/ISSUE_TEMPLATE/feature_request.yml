name: Feature Request
description: Suggest something new or a change to existing behavior.
type: Feature
body:
    - type: checkboxes
      attributes:
          label: Quick check
          options:
              - label: I searched existing issues first.
                required: true

    - type: textarea
      id: problem
      attributes:
          label: Problem or use case
          description: What are you trying to do?
      validations:
          required: true

    - type: textarea
      id: solution
      attributes:
          label: Proposed solution
      validations:
          required: true

    - type: textarea
      id: alternatives
      attributes:
          label: Alternatives considered
      validations:
          required: false

    - type: dropdown
      id: area
      attributes:
          label: Related area
          options:
              - Bar
              - Dropdowns (volume, network, bluetooth, etc.)
              - Notifications
              - OSD
              - Theming / Appearance
              - Configuration
              - CLI
              - Not sure
      validations:
          required: false
